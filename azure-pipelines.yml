trigger:
  - main

pool:
  name: 'Default'
  
stages:

  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: BuildJob
        displayName: 'Build and Test'
        steps:

          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
            displayName: 'Install Node.js'

          - script: npm install
            displayName: 'Install dependencies'

          - script: npm test -- --coverage --coverageReporters=lcov cobertura
            displayName: 'Run unit tests with coverage'

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: 'coverage/cobertura-coverage.xml'
            displayName: 'Publish coverage report'

  - stage: CodeAnalysis
    displayName: 'SonarQube Analysis'
    dependsOn: Build
    jobs:
      - job: SonarJob
        variables:
          - group: sonar-secrets
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
          - script: npm install
            displayName: 'Install dependencies'
          - script: |
              npx sonar-scanner@3.1.0 \
                -Dsonar.projectKey=$(SONAR_PROJECT_KEY) \
                -Dsonar.organization=$(SONAR_ORGANIZATION) \
                -Dsonar.sources=. \
                -Dsonar.host.url=https://sonarcloud.io \
                -Dsonar.token=$(SONAR_TOKEN)
            displayName: 'Run SonarQube analysis'

  - stage: Deliver
    displayName: 'Deliver Stage'
    dependsOn: CodeAnalysis
    jobs:
      - job: DeliverJob
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
          - script: npm install
            displayName: 'Install dependencies'
          - script: npm pack
            displayName: 'Package artifact with npm'

  - stage: DeployDev
    displayName: 'Deploy to Dev'
    dependsOn: Deliver
    jobs:
      - job: DevJob
        steps:
          - script: echo "Deploying to Dev environment..."
            displayName: 'Deploy to Dev'
          - script: echo "App launched in Dev!"
            displayName: 'Launch app in Dev'

  - stage: DeployQAT
    displayName: 'Deploy to QAT'
    dependsOn: DeployDev
    jobs:
      - job: QATJob
        steps:
          - script: echo "Deploying to QAT environment..."
            displayName: 'Deploy to QAT'

  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: DeployQAT
    jobs:
      - job: StagingJob
        steps:
          - script: echo "Deploying to Staging environment..."
            displayName: 'Deploy to Staging'

  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: DeployStaging
    jobs:
      - job: ProdJob
        steps:
          - script: echo "Deploying to Production environment..."
            displayName: 'Deploy to Production'
